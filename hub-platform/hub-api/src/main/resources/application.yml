spring:
  application:
    name: hub-api
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hub_dev}
    username: ${SPRING_DATASOURCE_USERNAME:hub}
    password: ${SPRING_DATASOURCE_PASSWORD:localdevpassword}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:dev-secret-key-minimum-256-bits-long-for-hmac-sha256-algorithm-needs-this}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.hubaccess: DEBUG
    org.hibernate.SQL: DEBUG
