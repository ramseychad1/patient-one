<div class="page-header">
  <div>
    <h1 class="page-title">Task Queue</h1>
    <p class="page-sub">{{ tasks.length }} tasks assigned to you</p>
  </div>
</div>

<div class="filter-row">
  <button *ngFor="let f of filters"
          class="filter-chip"
          [class.active]="activeFilter === f"
          (click)="setFilter(f)">{{ f === 'InProgress' ? 'In Progress' : f }}</button>
</div>

<div class="task-list">
  <div *ngFor="let task of filteredTasks"
       class="task-card card"
       [class.overdue]="isOverdue(task)"
       [class.completed]="task.status === 'Completed'">
    <div class="tc-top">
      <div class="tc-left">
        <span class="tc-title">{{ task.title }}</span>
        <div class="tc-meta">
          <a class="tc-case mono" [routerLink]="['/cases', task.caseId]">{{ task.caseNumber }}</a>
          <span class="tc-patient">{{ task.patientName }}</span>
          <span class="tc-program">{{ task.programName }}</span>
        </div>
      </div>
      <div class="tc-right">
        <span class="pill" [ngClass]="getPriorityClass(task.priority)">{{ task.priority }}</span>
        <select class="tc-status-select"
                [ngModel]="task.status"
                (ngModelChange)="updateTaskStatus(task, $event)">
          <option value="Open">Open</option>
          <option value="InProgress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
      </div>
    </div>
    <div class="tc-bottom">
      <span class="tc-type">{{ task.taskType }}</span>
      <span *ngIf="task.dueDate" class="tc-due" [class.overdue-text]="isOverdue(task)">
        Due: {{ task.dueDate | date:'shortDate' }}
      </span>
      <span *ngIf="isOverdue(task)" class="tc-overdue-badge">Overdue</span>
      <span *ngIf="task.autoGenerated" class="tc-auto">Auto-generated</span>
    </div>
  </div>
  <div *ngIf="filteredTasks.length === 0" class="empty-state">
    No tasks in your queue. You're all caught up!
  </div>
</div>
